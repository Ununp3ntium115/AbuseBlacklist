name: Privacy feed health

on:
  schedule:
    # Weekly probe for large privacy DNS lists; the full dump ingests them daily.
    - cron: "41 4 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Probe privacy DNS feeds
        run: |
          set -euo pipefail
          urls=(
            "https://easylist.to/easylist/easyprivacy.txt"
            "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
            "https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt"
          )
          for u in "${urls[@]}"; do
            echo "Checking $u"
            curl -fsSLI --max-time 30 "$u" > /dev/null
          done

