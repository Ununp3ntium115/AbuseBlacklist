name: Fast feed health

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Probe fast-cadence feeds
        run: |
          set -euo pipefail
          urls=(
            "https://feodotracker.abuse.ch/downloads/ipblocklist_recommended.txt"
            "https://feodotracker.abuse.ch/downloads/ipblocklist.txt"
            "https://threathive.net/hiveblocklist.txt"
          )
          for u in "${urls[@]}"; do
            echo "Checking $u"
            curl -fsSLI --max-time 30 "$u" > /dev/null
          done

