name: Daily threatfeed dump

on:
  push:
    branches:
      - main
    paths:
      - "config.json"
      - "feeds/**"
      - "scripts/**"
      - ".github/workflows/daily-dump.yml"
  schedule:
    # Daily at 03:17 UTC.
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-threatfeed-dump
  cancel-in-progress: false

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build daily blocklist dump
        run: python3 scripts/build_blocklists.py

      - name: Show manifest stats
        run: cat output/source-manifest.json

      - name: Commit updated dump
        id: commit_changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Daily threatfeed dump $(date -u +'%Y-%m-%d')"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push updated dump
        if: steps.commit_changes.outputs.changed == 'true'
        run: |
          git pull --rebase origin main
          git push

